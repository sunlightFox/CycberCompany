id: clawhub-excel-analysis-workbook
bundle_revision: 0.1.0
display_name: ClawHub Excel Analysis Workbook
description: 生成真实 Excel xlsx 分析工作簿、经营数据表和摘要 sheet。
author: clawhub
triggers:
  intents: [excel_analysis, spreadsheet_analysis, office_spreadsheet]
  keywords: [Excel, xlsx, 表格, 数据分析, 经营数据]
required_tools: [office.excel.generate]
permissions:
  tools:
    - name: office.excel.generate
      actions: [write_task_artifact]
      risk: R2
  assets: []
filesystem:
  allowed_roots: [workspace://artifacts/**]
safety:
  unattended_allowed: false
steps:
  - tool_name: office.excel.generate
    args:
      filename: clawhub-excel-analysis.xlsx
      goal: "{goal}"
      summary: "{content}"
      sheets: "{sheets}"
      analysis_summary: "{content}"
eval_cases:
  - id: excel_analysis_generates_xlsx
    input: {goal: 生成经营数据分析表, content: 收入增长成本稳定}
    expected: {artifact_type: office_spreadsheet}
