id: clawhub-github-pr-workflow
bundle_revision: 0.1.0
display_name: ClawHub GitHub PR Workflow
description: 受控输出 GitHub 协作结果摘要。
author: clawhub
triggers:
  intents:
    - code_hosting
  keywords:
    - github
    - pull request
    - review
    - release
required_tools:
  - file.write
permissions:
  tools:
    - name: file.write
      actions: [write_task_artifact]
      risk: R2
  assets: []
filesystem:
  allowed_roots:
    - workspace://artifacts/**
safety:
  unattended_allowed: false
steps:
  - tool_name: file.write
    args:
      path: outputs/clawhub-github-pr-workflow.md
      content: |
        # ClawHub GitHub PR Workflow

        - request_type: {code_hosting_request_type}
        - repository: {remote_repo_ref}
        - base_branch: {base_branch}
        - target_branch: {target_branch}
        - pr_ref: {pr_ref}
        - review_action: {review_action}
        - release_kind: {release_kind}
evals:
  - id: writes_artifact
    input:
      code_hosting_request_type: code_hosting_pr_request
      remote_repo_ref: github.com/example/repo
      base_branch: main
      target_branch: feature/demo
      pr_ref: PR-1
      review_action: comment
      release_kind: draft
    expected:
      artifact: outputs/clawhub-github-pr-workflow.md
