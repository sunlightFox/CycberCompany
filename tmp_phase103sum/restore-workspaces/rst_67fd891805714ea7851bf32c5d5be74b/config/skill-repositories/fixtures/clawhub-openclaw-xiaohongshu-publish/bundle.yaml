id: clawhub-openclaw-xiaohongshu-publish
bundle_revision: 0.1.0
display_name: ClawHub OpenClaw Xiaohongshu Publish
description: Controlled translation of the OpenClaw xiaohongshu-publish skill into a workflow artifact plus review draft.
author: clawhub
triggers:
  intents:
    - external_platform_publish
  keywords:
    - xiaohongshu
    - xhs
    - rednote
    - publish
    - openclaw
required_tools:
  - file.write
steps:
  - tool_name: file.write
    args:
      path: outputs/clawhub-openclaw-xiaohongshu-publish.md
      content: |
        # OpenClaw Xiaohongshu Publish Draft

        - platform: {platform_display_name}
        - request_type: {request_type}
        - action_type: {action_type}
        - account: {account_display_name}
        - publish_surface: {publish_surface}
        - selected_asset_id: {selected_asset_id}
        - selected_handle_id: {selected_handle_id}

        ## Title
        {title}

        ## Body
        {body}

        ## Tags
        {tags}

        ## First Comment
        {comment_text}

        ## Media Artifact IDs
        {media_artifact_ids}
  - tool_name: file.write
    args:
      path: outputs/clawhub-openclaw-xiaohongshu-publish.workflow.json
      content: |
        {
          "capabilities": {workflow_capabilities_json},
          "real_browser_workflow": {real_browser_workflow_json},
          "provider_mode": "playwright",
          "publish_flow": {
            "start_url": "{publish_url}",
            "wait_until": "{publish_wait_until}",
            "publish_success_text": "{publish_success_text}",
            "upload_success_text": "{upload_success_text}",
            "verify": {
              "expected_url": "{target_post_url}"
            },
            "selectors": {
              "title": "{publish_title_selector}",
              "body": "{publish_body_selector}",
              "submit": "{publish_submit_selector}",
              "form": "{publish_form_selector}",
              "upload": "{publish_upload_selector}"
            }
          },
          "post_publish_identity": {
            "capture_post_identity": true
          },
          "comment_flow": {
            "start_url": "{comment_start_url}",
            "target_post_url": "{target_post_url}",
            "comment_success_text": "{comment_success_text}",
            "recheck_wait_text": "{comment_recheck_wait_text}",
            "verify": {
              "expected_url": "{target_post_url}"
            },
            "selectors": {
              "comment_box": "{comment_box_selector}",
              "comment_input": "{comment_input_selector}",
              "comment_submit": "{comment_submit_selector}",
              "comment_form": "{comment_form_selector}"
            }
          },
          "verification": {
            "require_post_identity": true,
            "proof_source": "page_text"
          }
        }
eval_cases:
  - id: writes_publish_workflow
    input:
      platform_display_name: Xiaohongshu
      request_type: content_platform_publish_request
      action_type: publish_content
      account_display_name: Brand Account
      publish_surface: text_note
      selected_asset_id: asset_demo
      selected_handle_id: handle_demo
      title: Demo Title
      body: Demo Body
      tags: [demo, release]
      comment_text: first comment
      media_artifact_ids: [art_demo_1]
      workflow_capabilities_json: "[\"publish_browser\",\"comment_browser\"]"
      real_browser_workflow_json: "false"
      publish_url: https://creator.xiaohongshu.com/publish/publish
      publish_wait_until: domcontentloaded
      publish_success_text: ""
      upload_success_text: upload complete
      publish_title_selector: input[placeholder*='标题']
      publish_body_selector: div[contenteditable='true']
      publish_submit_selector: button:has-text('发布')
      publish_form_selector: ""
      publish_upload_selector: input[type='file']
      target_post_url: https://www.xiaohongshu.com/explore/demo
      comment_start_url: https://www.xiaohongshu.com/explore/demo
      comment_success_text: ""
      comment_recheck_wait_text: ""
      comment_box_selector: button:has-text('评论')
      comment_input_selector: textarea
      comment_submit_selector: button:has-text('发送')
      comment_form_selector: ""
    expected:
      artifact: outputs/clawhub-openclaw-xiaohongshu-publish.workflow.json
