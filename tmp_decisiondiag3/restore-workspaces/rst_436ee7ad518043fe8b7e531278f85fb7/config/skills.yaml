skills:
  default_repository_id: clawhub
  repositories:
    - repository_id: clawhub
      display_name: ClawHub
      provider: index_json
      index_uri: config/skill-repositories/clawhub.index.json
      enabled: true
      priority: 10
      trust_level: curated
    - repository_id: skillhub
      display_name: SkillHub
      provider: index_json
      index_uri: config/skill-repositories/skillhub.index.json
      enabled: true
      priority: 20
      trust_level: restricted
      auth:
        env_ref: SKILLHUB_API_KEY
