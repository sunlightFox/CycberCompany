id: clawhub-word-edit
bundle_revision: 0.1.0
display_name: ClawHub Word Edit
description: 编辑任务 artifact 中的 Word docx，追加章节、替换文字和添加表格。
author: clawhub
triggers:
  intents: [word_edit, office_document_edit]
  keywords: [Word, docx, 编辑, 修改文档, 追加章节]
required_tools: [office.word.edit]
permissions:
  tools:
    - name: office.word.edit
      actions: [read_task_artifact, write_task_artifact]
      risk: R2
  assets: []
filesystem:
  allowed_roots: [workspace://artifacts/**]
safety:
  unattended_allowed: false
steps:
  - tool_name: office.word.edit
    args:
      source_artifact_id: "{source_artifact_id}"
      filename: clawhub-word-report-edited.docx
      operations:
        - type: append_section
          title: 风险与下一步
          paragraphs: ["{content}"]
eval_cases:
  - id: word_edit_requires_source
    input: {source_artifact_id: art_demo, content: 补充风险}
    expected: {artifact_type: office_document}
