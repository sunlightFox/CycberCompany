channels:
  providers:
    wechat:
      enabled: true
      state_dir: data/channel-providers/wechat
      timeout_seconds: 10
      min_version: "0.4.0"
      private_chat_only: true
      group_messages: disabled
      allow_mock_fallback: false
      poll_enabled: true
      poll_interval_seconds: 5
      poll_batch_size: 20
      pairing_required: true
      allow_unknown_private: false
      media:
        enabled: true
        max_bytes: 10485760
        allowed_types:
          - image
          - audio
          - file
        transcribe_provider: local
        vision_enabled: true
    wechat_mock:
      enabled: true
      test_only: true
      private_chat_only: true
      group_messages: disabled
