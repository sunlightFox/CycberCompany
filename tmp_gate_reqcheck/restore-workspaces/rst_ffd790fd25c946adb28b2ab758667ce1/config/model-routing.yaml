routing:
  default: local_main
  reserved_output_tokens: 1024
  timeouts:
    connect_seconds: 10
    first_token_seconds: 30
    total_seconds: 180
  retry:
    network_errors: 1
    auth_errors: 0
  privacy:
    high:
      allow_cloud: false
      route: local_main
    medium:
      allow_cloud: true
      route: local_main
      fallback: cloud_strong
    low:
      allow_cloud: true
      route: cloud_strong
  tasks:
    intent_classify: local_fast
    memory_extract: local_fast
    daily_chat: local_main
    planning: cloud_strong
    code: cloud_strong
    response_compose: local_fast
