id: clawhub-excel-edit
bundle_revision: 0.1.0
display_name: ClawHub Excel Edit
description: 编辑任务 artifact 中的 Excel xlsx，追加行、新增 sheet 和设置单元格。
author: clawhub
triggers:
  intents: [excel_edit, spreadsheet_edit]
  keywords: [Excel, xlsx, 编辑表格, 追加行, 新增sheet]
required_tools: [office.excel.edit]
permissions:
  tools:
    - name: office.excel.edit
      actions: [read_task_artifact, write_task_artifact]
      risk: R2
  assets: []
filesystem:
  allowed_roots: [workspace://artifacts/**]
safety:
  unattended_allowed: false
steps:
  - tool_name: office.excel.edit
    args:
      source_artifact_id: "{source_artifact_id}"
      filename: clawhub-excel-analysis-edited.xlsx
      operations:
        - type: append_rows
          sheet: Data
          rows:
            - [新增指标, 0, "{content}"]
eval_cases:
  - id: excel_edit_requires_source
    input: {source_artifact_id: art_demo, content: 补充指标}
    expected: {artifact_type: office_spreadsheet}
