id: clawhub-project-followup
bundle_revision: 0.1.0
display_name: ClawHub Project Follow-up
description: 生成项目状态更新、风险清单、下一步计划和负责人跟进文案。
author: clawhub
triggers:
  intents: [project_followup, status_update]
  keywords: [项目, 进度, 风险, 跟进, project, status]
required_tools: [file.write]
permissions:
  tools:
    - name: file.write
      actions: [write_task_artifact]
      risk: R2
  assets: []
filesystem:
  allowed_roots: [workspace://artifacts/**]
safety:
  unattended_allowed: false
steps:
  - tool_name: file.write
    args:
      path: outputs/clawhub-project-followup.md
      content: "# Project Follow-up\n\n## 项目上下文\n{content}\n\n## 输出结构\n- 当前状态\n- 风险/阻塞\n- 决策需求\n- 下一步\n- 跟进消息草稿\n"
evals:
  - id: writes_project_artifact
    input: {content: demo}
    expected: {artifact: outputs/clawhub-project-followup.md}
