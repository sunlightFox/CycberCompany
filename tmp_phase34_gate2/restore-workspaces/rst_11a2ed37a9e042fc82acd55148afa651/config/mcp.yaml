mcp:
  enabled: false
  allowed_stdio_commands:
    - fake-mcp
    - eval-mcp
  blocked_stdio_markers:
    - remove-item
    - rm -
    - del /
    - format 
    - shutdown
    - reg delete
    - master.key
    - local_secrets.json
    - data/secrets
  default_unknown_tool_status: disabled
  servers: []
