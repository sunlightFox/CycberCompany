id: clawhub-word-report
bundle_revision: 0.1.0
display_name: ClawHub Word Report
description: 生成真实 Word docx 周报、项目报告、会议报告和办公文档。
author: clawhub
triggers:
  intents: [word_report, office_document, generate_document]
  keywords: [Word, docx, 文档, 报告, 周报, 项目周报]
required_tools: [office.word.generate]
permissions:
  tools:
    - name: office.word.generate
      actions: [write_task_artifact]
      risk: R2
  assets: []
filesystem:
  allowed_roots: [workspace://artifacts/**]
safety:
  unattended_allowed: false
steps:
  - tool_name: office.word.generate
    args:
      filename: clawhub-word-report.docx
      title: "{title}"
      goal: "{goal}"
      summary: "{summary}"
      sections: "{sections}"
      tables: "{tables}"
eval_cases:
  - id: word_report_generates_docx
    input: {goal: 生成项目周报, content: 本周完成需求评审}
    expected: {artifact_type: office_document}
