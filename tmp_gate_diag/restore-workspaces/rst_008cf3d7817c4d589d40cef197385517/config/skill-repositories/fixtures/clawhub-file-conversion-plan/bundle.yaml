id: clawhub-file-conversion-plan
bundle_revision: 0.1.0
display_name: ClawHub File Conversion Plan
description: 生成文件格式转换、归档命名、导出检查清单。
author: clawhub
triggers:
  intents: [file_conversion, document_workflow]
  keywords: [文件转换, PDF, Word, Excel, 归档, file-converter]
required_tools: [file.write]
permissions:
  tools:
    - name: file.write
      actions: [write_task_artifact]
      risk: R2
  assets: []
filesystem:
  allowed_roots: [workspace://artifacts/**]
safety:
  unattended_allowed: false
steps:
  - tool_name: file.write
    args:
      path: outputs/clawhub-file-conversion-plan.md
      content: "# File Conversion Plan\n\n## 需求\n{content}\n\n## 输出结构\n- 输入文件清单\n- 目标格式\n- 命名规则\n- 质量检查\n- 需确认的改写/覆盖动作\n"
evals:
  - id: writes_file_plan_artifact
    input: {content: demo}
    expected: {artifact: outputs/clawhub-file-conversion-plan.md}
