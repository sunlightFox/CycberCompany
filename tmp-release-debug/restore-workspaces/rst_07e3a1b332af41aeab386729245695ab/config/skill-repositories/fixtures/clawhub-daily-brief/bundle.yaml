id: clawhub-daily-brief
bundle_revision: 0.1.0
display_name: ClawHub Daily Brief
description: 生成日报、周报、晨会简报和管理层摘要。
author: clawhub
triggers:
  intents: [daily_brief, weekly_report, office_report]
  keywords: [日报, 周报, 简报, 晨会, brief, report]
required_tools: [file.write]
permissions:
  tools:
    - name: file.write
      actions: [write_task_artifact]
      risk: R2
  assets: []
filesystem:
  allowed_roots: [workspace://artifacts/**]
safety:
  unattended_allowed: false
steps:
  - tool_name: file.write
    args:
      path: outputs/clawhub-daily-brief.md
      content: "# Daily Brief\n\n## 输入\n{content}\n\n## 建议结构\n- 今日重点\n- 已完成\n- 风险与阻塞\n- 明日计划\n- 需要用户确认的事项\n"
evals:
  - id: writes_brief_artifact
    input: {content: demo}
    expected: {artifact: outputs/clawhub-daily-brief.md}
