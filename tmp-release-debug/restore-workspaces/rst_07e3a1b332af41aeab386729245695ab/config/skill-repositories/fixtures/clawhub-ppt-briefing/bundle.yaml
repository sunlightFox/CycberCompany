id: clawhub-ppt-briefing
bundle_revision: 0.1.0
display_name: ClawHub PPT Briefing
description: 生成真实 PowerPoint pptx 汇报、路演、项目复盘和会议演示稿。
author: clawhub
triggers:
  intents: [ppt_briefing, presentation, office_presentation]
  keywords: [PPT, pptx, PowerPoint, 演示稿, 汇报, briefing]
required_tools: [office.ppt.generate]
permissions:
  tools:
    - name: office.ppt.generate
      actions: [write_task_artifact]
      risk: R2
  assets: []
filesystem:
  allowed_roots: [workspace://artifacts/**]
safety:
  unattended_allowed: false
steps:
  - tool_name: office.ppt.generate
    args:
      filename: clawhub-ppt-briefing.pptx
      title: "{title}"
      subtitle: "{summary}"
      goal: "{goal}"
      slides: "{slides}"
eval_cases:
  - id: ppt_briefing_generates_pptx
    input: {goal: 做一个5页PPT汇报, content: 项目进入验收阶段}
    expected: {artifact_type: office_presentation}
