id: clawhub-ppt-edit
bundle_revision: 0.1.0
display_name: ClawHub PPT Edit
description: 编辑任务 artifact 中的 PPT pptx，追加页面和替换文本。
author: clawhub
triggers:
  intents: [ppt_edit, presentation_edit]
  keywords: [PPT, pptx, PowerPoint, 编辑演示稿, 追加页面]
required_tools: [office.ppt.edit]
permissions:
  tools:
    - name: office.ppt.edit
      actions: [read_task_artifact, write_task_artifact]
      risk: R2
  assets: []
filesystem:
  allowed_roots: [workspace://artifacts/**]
safety:
  unattended_allowed: false
steps:
  - tool_name: office.ppt.edit
    args:
      source_artifact_id: "{source_artifact_id}"
      filename: clawhub-ppt-briefing-edited.pptx
      operations:
        - type: append_slide
          title: 补充说明
          bullets: ["{content}"]
eval_cases:
  - id: ppt_edit_requires_source
    input: {source_artifact_id: art_demo, content: 补充一页风险}
    expected: {artifact_type: office_presentation}
